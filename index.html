<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON TRANSPORT INTERACTIVE - ESL Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #050505;
            --panel-bg: rgba(10, 10, 15, 0.85);
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --neon-green: #39ff14;
            --neon-red: #ff003c;
            --text-light: #e0e0e0;
            --grid-color: rgba(0, 243, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            /* Cyberpunk Grid Background */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-light);
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
            text-align: center;
        }

        h2, h3 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Layout for two teams */
        .game-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        @media(min-width: 800px) {
            .game-wrapper {
                flex-direction: row;
            }
        }

        /* Cyberpunk Containers */
        .team-container {
            flex: 1;
            background: var(--panel-bg);
            border: 2px solid #333;
            border-radius: 8px;
            padding: 1.5rem;
            position: relative;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
        }

        /* Team Specific Styling */
        #boys { box-shadow: 0 0 20px rgba(0, 243, 255, 0.1); }
        #girls { box-shadow: 0 0 20px rgba(255, 0, 255, 0.1); }

        /* Neon Top Borders */
        #boys::before, #girls::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 3px;
        }
        #boys::before { background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent); }
        #girls::before { background: linear-gradient(90deg, transparent, var(--neon-magenta), transparent); }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        #boys .header h2 { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,243,255,0.5); }
        #girls .header h2 { color: var(--neon-magenta); text-shadow: 0 0 10px rgba(255,0,255,0.5); }
        
        .header div { font-family: 'Orbitron', sans-serif; }
        #boys .score { color: var(--neon-cyan); }
        #girls .score { color: var(--neon-magenta); }

        /* Tabs */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            min-width: 60px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--text-light);
            border: 1px solid #444;
            padding: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .tab-btn:hover { background: #111; border-color: #777; }
        
        #boys .tab-btn.active { 
            border-color: var(--neon-cyan); 
            color: var(--neon-cyan); 
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2) inset; 
        }
        #girls .tab-btn.active { 
            border-color: var(--neon-magenta); 
            color: var(--neon-magenta); 
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2) inset; 
        }

        /* Game Area */
        .game-area {
            flex-grow: 1;
            background: #000;
            border: 2px dashed #444;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        /* Scanline Overlay */
        .game-area::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.02) 2px,
                rgba(255,255,255,0.02) 4px
            );
            pointer-events: none;
            z-index: 5;
        }

        .progress-text {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #777;
            z-index: 10;
        }

        h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
            color: #fff;
            z-index: 10;
        }

        /* Terminal Style Hint */
        .hint-text {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 10px;
            margin-bottom: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            color: var(--neon-cyan);
            width: 100%;
            z-index: 10;
            text-shadow: 0 0 5px rgba(0, 243, 255, 0.5);
        }

        #girls .hint-text {
            background: rgba(255, 0, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.3);
            color: var(--neon-magenta);
            text-shadow: 0 0 5px rgba(255, 0, 255, 0.5);
        }

        .word {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            letter-spacing: 5px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            z-index: 10;
        }

        .big-emoji {
            font-size: 6rem;
            line-height: 1;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.3));
            z-index: 10;
        }

        /* Cyberpunk Input */
        input[type="text"] {
            width: 80%;
            padding: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            border: none;
            border-bottom: 2px solid #555;
            background: rgba(255,255,255,0.05);
            color: white;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
            transition: border-color 0.3s;
            z-index: 10;
            position: relative;
        }

        #boys input[type="text"]:focus { border-bottom-color: var(--neon-cyan); box-shadow: 0 10px 10px -10px var(--neon-cyan); }
        #girls input[type="text"]:focus { border-bottom-color: var(--neon-magenta); box-shadow: 0 10px 10px -10px var(--neon-magenta); }

        /* Buttons */
        .action-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            color: var(--text-light);
            padding: 12px 20px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            width: 100%;
            max-width: 250px;
            z-index: 10;
            position: relative;
        }

        .action-btn:hover { border-color: #777; background: #111; }
        .action-btn:active { transform: scale(0.95); }
        .action-btn.correct { border-color: var(--neon-green); color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green); }
        .action-btn.wrong { border-color: var(--neon-red); color: var(--neon-red); text-shadow: 0 0 5px var(--neon-red); }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }

        /* Memory Game */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }

        .memory-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
        }

        .memory-card .emoji { opacity: 0; transition: opacity 0.2s; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        
        #boys .memory-card.flipped { background: rgba(0, 243, 255, 0.1); border-color: var(--neon-cyan); transform: scale(1.05); }
        #girls .memory-card.flipped { background: rgba(255, 0, 255, 0.1); border-color: var(--neon-magenta); transform: scale(1.05); }
        
        .memory-card.flipped .emoji { opacity: 1; }
        .memory-card.matched { background: rgba(57, 255, 20, 0.2) !important; border-color: var(--neon-green) !important; }
        .memory-card.matched .emoji { opacity: 1; }

        /* Catch It Game */
        .falling {
            position: absolute;
            top: -50px;
            background: #000;
            color: white;
            padding: 8px 15px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid #777;
            animation: fall linear forwards;
            z-index: 20;
            white-space: nowrap;
            text-transform: uppercase;
        }
        
        #boys .falling { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0,243,255,0.3) inset; }
        #girls .falling { border-color: var(--neon-magenta); box-shadow: 0 0 10px rgba(255,0,255,0.3) inset; }
        
        .falling:hover { background: #222; transform: scale(1.1); }

        @keyframes fall {
            0% { top: -50px; }
            100% { top: 110%; }
        }

        /* Glitch/Neon Animations */
        @keyframes flashCorrect {
            0% { box-shadow: inset 0 0 0px var(--neon-green); }
            50% { box-shadow: inset 0 0 50px var(--neon-green); }
            100% { box-shadow: inset 0 0 0px var(--neon-green); }
        }

        @keyframes flashWrong {
            0% { box-shadow: inset 0 0 0px var(--neon-red); }
            50% { box-shadow: inset 0 0 50px var(--neon-red); }
            100% { box-shadow: inset 0 0 0px var(--neon-red); }
        }

        /* Puzzle Game Styles */
        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            width: 260px;
            height: 260px;
            background: #111;
            border: 2px solid #444;
            z-index: 10;
        }

        .puzzle-piece {
            width: 100%;
            height: 100%;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            background-color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .puzzle-piece:hover {
            filter: brightness(1.2);
        }

        #boys .puzzle-piece.selected {
            border: 2px solid var(--neon-cyan);
            transform: scale(0.9);
            box-shadow: 0 0 10px var(--neon-cyan);
            z-index: 2;
        }

        #girls .puzzle-piece.selected {
            border: 2px solid var(--neon-magenta);
            transform: scale(0.9);
            box-shadow: 0 0 10px var(--neon-magenta);
            z-index: 2;
        }
    </style>
</head>

            { id: 34, name: "Electric Bike", emoji: "🚲⚡", imgsrc: "https://upload.wikimedia.org/wikipedia/commons/2/2d/LACMTA_Bike_Share_electric_bicycle_-_non-drive_side.jpg", hint: "A bicycle with an integrated electric motor." },

        // --- AUDIO SYNTHESIS ---
        function playSound(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            
            if (type === "correct") {
                osc.type = "sine";
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } else if (type === "wrong") {
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(200, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
                osc.start();
                osc.stop(ctx.currentTime + 0.2);
            } else if (type === "levelUp") {
                osc.type = "square";
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.setValueAtTime(600, ctx.currentTime + 0.1);
                osc.frequency.setValueAtTime(800, ctx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.4);
                osc.start();
                osc.stop(ctx.currentTime + 0.4);
            }
        }

        // --- UTILITY ---
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // --- GAME FACTORY FUNCTION ---
        function createTeam(container, name) {
            container.innerHTML = `
                <div class="header">
                    <h2>${name}</h2>
                    <div>SCORE: <span class="score">0</span></div>
                </div>
                
                <div class="tabs">
                    <button class="tab-btn" data-level="1">Unjumble</button>
                    <button class="tab-btn" data-level="2">Emojis</button>
                    <button class="tab-btn" data-level="3">Decrypt</button>
                    <button class="tab-btn" data-level="4">Memory</button>
                    <button class="tab-btn" data-level="5">Catch It</button>
                    <button class="tab-btn" data-level="6">Puzzle</button> </div>

                <div class="game-area"></div>
                <div style="text-align: center; margin-top: 10px;">
                    <button class="action-btn restart" style="width: auto; padding: 10px 20px; font-size: 0.9rem; font-family: 'Orbitron';">REBOOT SCORE</button>
                </div>
            `;

            let score = 0, level = 1, wordsCompleted = 0;
            const WORDS_PER_LEVEL = 10; 
            
            const scoreEl = container.querySelector(".score");
            const area = container.querySelector(".game-area");
            const tabBtns = container.querySelectorAll(".tab-btn");

            // Handle Tab Clicks
            tabBtns.forEach(btn => {
                btn.onclick = () => {
                    clearFallingItems();
                    level = parseInt(btn.dataset.level);
                    wordsCompleted = 0; 
                    loadCurrentLevelGame();
                };
            });

            function clearFallingItems() {
                if(container.spawnInterval) clearInterval(container.spawnInterval);
                area.querySelectorAll('.falling').forEach(el => el.remove());
            }

            function updateActiveTab() {
                tabBtns.forEach(b => {
                    if (parseInt(b.dataset.level) === level) b.classList.add("active");
                    else b.classList.remove("active");
                });
            }

            function updateScore(val) {
                score += val;
                scoreEl.textContent = score;
            }

            function triggerAnimation(type) {
                area.style.animation = "none";
                void area.offsetWidth; 
                area.style.animation = type === 'correct' ? "flashCorrect 0.4s" : "flashWrong 0.4s";
            }

            function handleCorrect(preventReload = false) {
                playSound("correct");
                triggerAnimation('correct');
                updateScore(10);
                wordsCompleted++;

                if (wordsCompleted >= WORDS_PER_LEVEL) {
                    playSound("levelUp");
                    showNextLevelButton();
                } else if (!preventReload) {
                    loadCurrentLevelGame(); 
                }
            }

            function handleWrong() {
                playSound("wrong");
                triggerAnimation('wrong');
                updateScore(-5);
            }

            function showNextLevelButton() {
                clearFallingItems();
                area.innerHTML = `
                    <h2 style="color:var(--neon-green); text-shadow:0 0 10px var(--neon-green); z-index:10;">LEVEL ${level} CLEARED</h2>
                    <p style="margin: 15px 0; z-index:10; font-family:'Orbitron';">DATA SYNC COMPLETE.</p>
                    <button class="action-btn" id="next-btn" style="border-color:var(--neon-cyan);">INITIATE NEXT >></button>
                `;
                area.querySelector("#next-btn").onclick = () => {
                    level++;
                    wordsCompleted = 0;
                    if (level > 6) {
                        area.innerHTML = `<h2 style="color:var(--neon-red); z-index:10;">SYSTEM HALTED</h2><h3 style="color:var(--neon-green); z-index:10;">FINAL SCORE: ${score}</h3><br><p style="z-index:10;">Select a protocol above to restart.</p>`;
                    } else {
                        loadCurrentLevelGame();
                    }
                };
            }

            function loadCurrentLevelGame() {
                updateActiveTab();
                if(level === 1) level1();
                else if(level === 2) level2();
                else if(level === 3) level3();
                else if(level === 4) level4();
                else if(level === 5) level5();
                else if(level === 6) level6(); // NEW LEVEL FUNCTION
            }

            function renderProgress() {
                return `<div class="progress-text">DATA LOG: ${wordsCompleted + 1} / ${WORDS_PER_LEVEL}</div>`;
            }

            // --- LEVEL 1: Unjumble ---
            function level1() {
                const item = TRANSPORT_DATA[Math.random() * TRANSPORT_DATA.length | 0];
                const targetWord = item.name;
                
                let scrambled = shuffle(targetWord.replace(/\s/g, '').split('')).join('');
                while(scrambled.toLowerCase() === targetWord.replace(/\s/g, '').toLowerCase() && targetWord.length > 1) {
                    scrambled = shuffle(targetWord.replace(/\s/g, '').split('')).join('');
                }

                area.innerHTML = `
                    ${renderProgress()}
                    <h3>DECRYPT DATA</h3>
                    <div class="hint-text">> SYSTEM CLUE: ${item.hint}</div>
                    <div class="word">${scrambled}</div>
                `;
                
                const input = document.createElement("input");
                input.type = "text";
                input.placeholder = "ENTER OVERRIDE CODE...";
                
                const btn = document.createElement("button");
                btn.className = "action-btn";
                btn.textContent = "VERIFY";

                btn.onclick = () => {
                    const sanitizedInput = input.value.replace(/\s/g, '').toLowerCase();
                    const sanitizedTarget = targetWord.replace(/\s/g, '').toLowerCase();
                    
                    if(sanitizedInput === sanitizedTarget) {
                        handleCorrect();
                    } else {
                        handleWrong();
                        input.value = "";
                    }
                };

                input.addEventListener("keypress", (e) => { if (e.key === "Enter") btn.click(); });

                const actionContainer = document.createElement("div");
                actionContainer.style.width = "100%";
                actionContainer.style.zIndex = "10";
                actionContainer.appendChild(input);
                actionContainer.appendChild(document.createElement("br"));
                actionContainer.appendChild(btn);

                area.appendChild(actionContainer);
                setTimeout(() => input.focus(), 100);
            }

            // --- LEVEL 2: Emojis ---
            function level2() {
                const item = TRANSPORT_DATA[Math.random() * TRANSPORT_DATA.length | 0];
                
                area.innerHTML = `
                    ${renderProgress()}
                    <h3>IDENTIFY ASSET</h3>
                    <div class="big-emoji">${item.emoji}</div>
                `;

                const options = [...TRANSPORT_DATA].sort(() => Math.random() - 0.5).slice(0, 4).map(c => c.name);
                if (!options.includes(item.name)) options[0] = item.name;
                shuffle(options); 

                const btnContainer = document.createElement("div");
                btnContainer.className = "options-grid";
                options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "action-btn";
                    btn.style.fontSize = "1rem";
                    btn.textContent = opt;
                    btn.onclick = () => {
                        if (opt === item.name) {
                            btn.classList.add('correct');
                            setTimeout(() => handleCorrect(), 300);
                        } else {
                            btn.classList.add('wrong');
                            handleWrong();
                            setTimeout(() => btn.classList.remove('wrong'), 500);
                        }
                    };
                    btnContainer.appendChild(btn);
                });

                area.appendChild(btnContainer);
            }

            // --- LEVEL 3: Descriptions ---
            function level3() {
                const item = TRANSPORT_DATA[Math.random() * TRANSPORT_DATA.length | 0];
                
                area.innerHTML = `
                    ${renderProgress()}
                    <h3>ANALYZE LOG</h3>
                    <div class="hint-text" style="font-size: 1.2rem; min-height: 100px; display:flex; align-items:center; justify-content:center; text-align:center;">
                        > LOG ENTRY: "${item.hint}"
                    </div>
                `;

                const options = [...TRANSPORT_DATA].sort(() => Math.random() - 0.5).slice(0, 4).map(c => c.name);
                if (!options.includes(item.name)) options[0] = item.name;
                shuffle(options); 

                const btnContainer = document.createElement("div");
                btnContainer.className = "options-grid";
                options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "action-btn";
                    btn.style.fontSize = "1rem";
                    btn.textContent = opt;
                    btn.onclick = () => {
                        if(opt === item.name) {
                            btn.classList.add('correct');
                            setTimeout(() => handleCorrect(), 300);
                        } else {
                            btn.classList.add('wrong');
                            handleWrong();
                            setTimeout(() => btn.classList.remove('wrong'), 500);
                        }
                    };
                    btnContainer.appendChild(btn);
                });

                area.appendChild(btnContainer);
            }

            // --- LEVEL 4: Memory Match (6x6 Grid) ---
            function level4() {
                area.innerHTML = `
                    ${renderProgress()}
                    <h3>MEMORY LINK</h3>
                    <div class="memory-grid"></div>
                `;

                // Select 18 random transports to make 36 cards total
                let selectedItems = shuffle([...TRANSPORT_DATA]).slice(0, 18);
                let cardsArray = [...selectedItems, ...selectedItems];
                shuffle(cardsArray);

                const grid = area.querySelector('.memory-grid');
                let flippedCards = [];
                let lockBoard = false;
                let pairsMatchedOnThisBoard = 0;

                cardsArray.forEach((item) => {
                    const card = document.createElement("div");
                    card.className = "memory-card";
                    card.dataset.name = item.name;
                    
                    const span = document.createElement("span");
                    span.className = "emoji";
                    span.textContent = item.emoji;
                    card.appendChild(span);

                    card.onclick = () => {
                        if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;
                        
                        card.classList.add('flipped');
                        flippedCards.push(card);

                        if (flippedCards.length === 2) {
                            lockBoard = true;
                            const match = flippedCards[0].dataset.name === flippedCards[1].dataset.name;

                            if (match) {
                                setTimeout(() => {
                                    flippedCards[0].classList.add('matched');
                                    flippedCards[1].classList.add('matched');
                                    flippedCards = [];
                                    lockBoard = false;
                                    pairsMatchedOnThisBoard++;
                                    
                                    handleCorrect(true); // true prevents reload
                                    
                                    // If board is fully cleared, reload a fresh board
                                    if (pairsMatchedOnThisBoard === 18 && wordsCompleted < WORDS_PER_LEVEL) {
                                        setTimeout(level4, 500); 
                                    }
                                }, 400);
                            } else {
                                handleWrong();
                                setTimeout(() => {
                                    flippedCards[0].classList.remove('flipped');
                                    flippedCards[1].classList.remove('flipped');
                                    flippedCards = [];
                                    lockBoard = false;
                                }, 800);
                            }
                        }
                    };
                    grid.appendChild(card);
                });
            }

            // --- LEVEL 5: Catch It! ---
            function level5() {
                const targetItem = TRANSPORT_DATA[Math.random() * TRANSPORT_DATA.length | 0];
                
                area.innerHTML = `
                    ${renderProgress()}
                    <h3>INTERCEPT DATA</h3>
                    <div class="big-emoji" style="margin-bottom: 0;">${targetItem.emoji}</div>
                `;

                clearFallingItems();

                container.spawnInterval = setInterval(() => {
                    const wordDiv = document.createElement("div");
                    wordDiv.className = "falling";
                    
                    // 30% chance to spawn the correct name, 70% random distraction
                    const isTarget = Math.random() > 0.7;
                    const spawnItem = isTarget ? targetItem : TRANSPORT_DATA[Math.random() * TRANSPORT_DATA.length | 0];
                    
                    wordDiv.textContent = spawnItem.name;
                    wordDiv.style.left = (5 + Math.random() * 70) + "%";
                    wordDiv.style.animationDuration = (2.5 + Math.random() * 2) + "s";

                    wordDiv.onclick = () => {
                        if(wordDiv.textContent === targetItem.name) {
                            clearFallingItems();
                            handleCorrect();
                        } else {
                            handleWrong();
                        }
                        wordDiv.remove();
                    };

                    area.appendChild(wordDiv);
                    setTimeout(() => {
                        if(area.contains(wordDiv)) wordDiv.remove();
                    }, 5000);
                }, 1000);
            }

           // --- LEVEL 6: Image Puzzle (Mobile-Friendly Tap-to-Swap) ---
            function level6() {
                const item = TRANSPORT_DATA[Math.random() * TRANSPORT_DATA.length | 0];
                const gridSize = 3; // 3x3 Grid
                
                area.innerHTML = `
                    ${renderProgress()}
                    <h3 style="margin-bottom: 5px;">RECONSTRUCT IMAGE</h3>
                    <p style="font-family: 'Orbitron'; font-size: 0.8rem; color: #aaa; margin-bottom: 10px; z-index:10;">TAP ONE PIECE, THEN TAP ANOTHER TO SWAP.</p>
                    <div class="puzzle-grid"></div>
                `;

                const puzzleGrid = area.querySelector('.puzzle-grid');
                let pieces = [];
                let selectedPiece = null;

                // Create the 9 pieces
                for (let i = 0; i < gridSize * gridSize; i++) {
                    let piece = document.createElement('div');
                    piece.className = 'puzzle-piece';
                    piece.dataset.correctIndex = i; // Store correct order
                    
                    // Calculate background position to slice the image
                    let xPercent = (i % gridSize) * (100 / (gridSize - 1));
                    let yPercent = Math.floor(i / gridSize) * (100 / (gridSize - 1));
                    
                    piece.style.backgroundImage = `url('${item.imgsrc}')`;
                    
                    // THE FIX: Force both width and height to scale exactly to the grid
                    piece.style.backgroundSize = `${gridSize * 100}% ${gridSize * 100}%`; 
                    piece.style.backgroundPosition = `${xPercent}% ${yPercent}%`;
                    
                    pieces.push(piece);
                }

                // Shuffle pieces
                pieces = shuffle(pieces);

                // Add to DOM and setup Tap-to-Swap logic
                pieces.forEach((piece) => {
                    puzzleGrid.appendChild(piece);
                    
                    piece.onclick = () => {
                        if (!selectedPiece) {
                            // First tap: Select piece
                            selectedPiece = piece;
                            piece.classList.add('selected');
                        } else if (selectedPiece === piece) {
                            // Tap same piece: Deselect
                            selectedPiece.classList.remove('selected');
                            selectedPiece = null;
                        } else {
                            // Second tap: Swap pieces in the DOM
                            let temp = document.createElement('div');
                            puzzleGrid.insertBefore(temp, piece);
                            puzzleGrid.insertBefore(piece, selectedPiece);
                            puzzleGrid.insertBefore(selectedPiece, temp);
                            temp.remove();

                            // Deselect
                            selectedPiece.classList.remove('selected');
                            selectedPiece = null;

                            // Check if solved
                            checkPuzzleComplete();
                        }
                    };
                });

                function checkPuzzleComplete() {
                    let currentPieces = puzzleGrid.querySelectorAll('.puzzle-piece');
                    let isSolved = true;
                    
                    currentPieces.forEach((p, index) => {
                        if (parseInt(p.dataset.correctIndex) !== index) {
                            isSolved = false;
                        }
                    });

                    if (isSolved) {
                        // Disable clicks
                        currentPieces.forEach(p => p.onclick = null);
                        // Add flash animation to the whole grid
                        puzzleGrid.style.border = '2px solid var(--neon-green)';
                        puzzleGrid.style.boxShadow = '0 0 20px var(--neon-green)';
                        
                        setTimeout(() => handleCorrect(), 800);
                    }
                }
            }
            container.querySelector(".restart").onclick = () => {
                clearFallingItems();
                score = 0; level = 1; wordsCompleted = 0;
                scoreEl.textContent = 0;
                loadCurrentLevelGame();
            };

            loadCurrentLevelGame();
        }

        // Initialize the two teams
        createTeam(document.getElementById("boys"), "BOYS");
        createTeam(document.getElementById("girls"), "GIRLS");
    </script>
</body>
</html>
